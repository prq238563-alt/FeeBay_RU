name: Validate

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate JSON dictionaries
        run: |
          python -c "
          import json
          from pathlib import Path
          for p in Path('translations').glob('strings_*.json'):
              json.loads(p.read_text(encoding='utf-8'))
              print('OK', p)
          for p in Path('overrides').glob('*.json'):
              json.loads(p.read_text(encoding='utf-8'))
              print('OK', p)
          "

      - name: Compile Python tools
        run: python -m compileall -q tools

      - name: Dry-run merge overrides (ru)
        run: python tools/merge_overrides.py --lang ru
